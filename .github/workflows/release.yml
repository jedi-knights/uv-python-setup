name: Release

on:
  workflow_run:
    workflows: [CI]
    types: [completed]
    branches: [main]

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write
  issues: write

jobs:
  release:
    if: github.event.workflow_run.event == 'push' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true
          token: ${{ github.token }}

      - name: Capture pre-release version
        id: pre
        run: echo "version=$(cat VERSION 2>/dev/null || echo '')" >> $GITHUB_OUTPUT

      - name: Configure git identity
        run: |
          git config user.name  "semantic-release-bot"
          git config user.email "semantic-release-bot@users.noreply.github.com"

      - name: Run semantic release
        uses: jedi-knights/go-semantic-release@v0.10.0
        with:
          github_token: ${{ github.token }}

      - name: Update floating major-version tag
        run: |
          NEW=$(cat VERSION 2>/dev/null || echo '')
          OLD="${{ steps.pre.outputs.version }}"
          if [ "$NEW" = "$OLD" ] || [ -z "$NEW" ]; then
            echo "No new release — skipping floating tag update."
            exit 0
          fi
          MAJOR="v$(echo "$NEW" | cut -d. -f1)"
          git tag -fa "$MAJOR" -m "Floating $MAJOR tag"
          git push origin "$MAJOR" --force
