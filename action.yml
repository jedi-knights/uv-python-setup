name: uv Python Setup
description: >-
  Bootstraps a Python + uv environment: installs Python, installs uv, and
  runs uv sync. Supports private PyPI registries via named-index credentials
  without embedding secrets in URLs.
author: jedi-knights

branding:
  icon: package
  color: purple

inputs:
  python-version:
    description: Python version to install.
    required: false
    default: '3.13'
  uv-version:
    description: uv version to install. Defaults to latest.
    required: false
    default: latest
  sync-args:
    description: Arguments passed to uv sync (e.g. --locked, --frozen, --all-extras).
    required: false
    default: --locked
  index-name:
    description: >-
      Name of the private index as declared in pyproject.toml [[tool.uv.index]].
      When set, index-username and index-password are exported as
      UV_INDEX_<NAME>_USERNAME and UV_INDEX_<NAME>_PASSWORD.
    required: false
    default: ''
  index-username:
    description: Username for the private index.
    required: false
    default: ''
  index-password:
    description: Password or token for the private index.
    required: false
    default: ''
  extra-index-url:
    description: Fallback index URL appended via UV_EXTRA_INDEX_URL.
    required: false
    default: https://pypi.org/simple

runs:
  using: composite
  steps:
    - name: Set up Python
      uses: actions/setup-python@v6
      with:
        python-version: ${{ inputs.python-version }}

    - name: Install uv
      uses: astral-sh/setup-uv@v8
      with:
        version: ${{ inputs.uv-version }}
        enable-cache: true
        cache-dependency-glob: uv.lock

    - name: Install dependencies
      shell: bash
      env:
        UV_EXTRA_INDEX_URL: ${{ inputs.extra-index-url }}
        _IDX_NAME: ${{ inputs.index-name }}
        _IDX_USER: ${{ inputs.index-username }}
        _IDX_PASS: ${{ inputs.index-password }}
      run: |
        if [ -n "$_IDX_NAME" ]; then
          UPPER=$(echo "$_IDX_NAME" | tr '[:lower:]-' '[:upper:]_')
          export "UV_INDEX_${UPPER}_USERNAME=$_IDX_USER"
          export "UV_INDEX_${UPPER}_PASSWORD=$_IDX_PASS"
        fi
        uv sync ${{ inputs.sync-args }}
